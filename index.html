<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <title>VocabPop 單字挑戰 - B2L3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #FFF9F2;
            --main-purple: #5D5FEF;
            --main-pink: #FFEDF6;
            --main-yellow: #FFD93D;
            --main-green: #A3E4B5;
            --main-red: #FF8A8A;
            --border-black: #000000;
        }
        body { 
            font-family: 'Lexend', "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-page);
            color: var(--border-black);
            overflow-x: hidden;
        }
        .brutal-card {
            background: white; border: 4px solid var(--border-black);
            box-shadow: 6px 6px 0px 0px var(--border-black); border-radius: 32px;
        }
        .brutal-btn {
            border: 4px solid var(--border-black); box-shadow: 4px 4px 0px 0px var(--border-black);
            transition: all 0.1s; cursor: pointer;
        }
        .brutal-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px 0px var(--border-black); }
        .brutal-input { border: 4px solid var(--border-black); border-radius: 20px; padding: 16px; font-weight: 800; font-size: 1.2rem; }
        
        /* Learn Header - 漸層 + 點點背景 */
        .learn-header {
            background: 
                radial-gradient(#ffffff44 2.5px, transparent 2.5px),
                linear-gradient(135deg, #5D5FEF 0%, #4B4DDB 100%);
            background-size: 24px 24px, 100% 100%;
            border-radius: 28px 28px 0 0;
            padding: 55px 20px 90px; 
            color: white; 
            text-align: center; 
            position: relative;
            border-bottom: 5px solid black;
        }
        .pos-tag {
            position: absolute; top: 20px; left: 20px;
            background: black; color: white; padding: 4px 14px;
            border-radius: 14px; font-weight: 900; font-style: italic; font-size: 0.85rem;
        }
        .ipa-pill {
            background: rgba(0,0,0,0.3); padding: 5px 24px;
            border-radius: 99px; font-weight: 800; font-size: 1.1rem;
            display: inline-block; margin-bottom: 15px;
        }
        .word-title { font-size: 5rem; font-weight: 900; line-height: 1; margin-bottom: 15px; letter-spacing: -2px; }
        .word-pill-tag {
            background: var(--main-yellow); color: black; border: 3.5px solid black;
            padding: 6px 32px; border-radius: 20px; font-weight: 900; font-size: 1.5rem;
            display: inline-block; margin-bottom: 25px;
            box-shadow: 3.5px 3.5px 0px black;
        }
        /* Speaker Button with Heavy Shadow */
        .speaker-btn {
            width: 105px; height: 105px; background: white; border: 5px solid black;
            box-shadow: 10px 10px 0px black; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto -145px; 
            cursor: pointer; position: relative; z-index: 50;
            transition: 0.1s;
        }
        .speaker-btn:active { transform: translate(4px, 4px); box-shadow: 6px 6px 0px black; }
        
        /* Mini Match UI */
        .mini-match-card {
            background: var(--main-pink); border: 3px solid #FFD1E8; border-radius: 28px; padding: 26px;
            margin-top: 85px;
        }
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .match-item {
            background: white; border: 3px solid #FFD1E8; padding: 16px; border-radius: 20px;
            font-size: 0.95rem; font-weight: 800; text-align: center; cursor: pointer;
            box-shadow: 3px 3px 0px #FFD1E8;
        }
        .match-item.selected { background: var(--main-yellow); border-color: black; box-shadow: 3px 3px 0px black; }
        .match-item.correct { background: #A3E4B5; border-color: black; opacity: 0.6; pointer-events: none; }

        /* Coach Feedback Layer */
        #feedbackOverlay {
            position: fixed; inset: 0; z-index: 100; display: none;
            align-items: center; justify-content: center; flex-direction: column;
            background-color: rgba(255,255,255,0.85); backdrop-filter: blur(8px);
        }
    </style>
</head>

        let state = { user: {}, xp: 0, currentView: 'login', challengePool: [], qIndex: 0, score: 0 };

        function login() {
            const cl = document.getElementById('classInput').value;
            const no = document.getElementById('noInput').value;
            const nm = document.getElementById('nameInput').value;
            if(!cl || !no || !nm) return;
            state.user = { class: cl, no: no, name: nm };
            document.getElementById('userInfoDisplay').innerText = `${cl}班 ${no}號 ${nm}`;
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainMenu').classList.remove('hidden');
            switchTab('learn');
        }

        function switchTab(tab) {
            state.currentView = tab;
            document.getElementById('learnView').classList.toggle('hidden', tab !== 'learn');
            document.getElementById('coachView').classList.toggle('hidden', tab !== 'coach');
            document.getElementById('tabLearn').style.backgroundColor = tab === 'learn' ? 'var(--main-pink)' : 'white';
            document.getElementById('tabCoach').style.backgroundColor = tab === 'coach' ? 'var(--main-pink)' : 'white';
            if(tab === 'learn') renderLearn();
        }

            const container = document.getElementById('learnView');
            container.innerHTML = vocabData.map((v, idx) => `
                <div class="brutal-card overflow-visible bg-white mb-24 relative">
                    <div class="learn-header">
                        <div class="pos-tag">${v.pos}</div>
                        <div class="ipa-pill">${v.ipa}</div>
                        <div class="word-title">${v.word}</div>
                        <div class="word-pill-tag">${v.word}</div>
                        <div class="speaker-btn" onclick="speak('${v.word}')">${boldSpeakerIcon}</div>
                    </div>
                    <div class="p-10 pt-28 space-y-10">
                        <div><div class="font-black mb-3 uppercase text-xs text-gray-400 tracking-widest">Meaning</div><p class="text-3xl font-black text-[#5D5FEF] border-l-8 border-[#5D5FEF] pl-5 italic">${v.chinese}</p></div>
                        <div><div class="font-black mb-3 uppercase text-xs text-gray-400 tracking-widest">Example</div><div class="bg-gray-50 border-4 border-gray-100 p-8 rounded-[32px] italic font-bold text-gray-700 text-xl">"${v.sentence}"</div></div>
                        <div class="mini-match-card"><div class="text-pink-600 font-black text-xs uppercase mb-3 tracking-widest">✨ Mini Match</div><div class="match-grid" id="match-grid-${idx}">
                            ${shuffleArray([...v.collocations]).map(c => `<div class="match-item" onclick="handleMatch(this, '${c.en}', ${idx}, 'en')">${c.en}</div>`).join('')}
                            ${shuffleArray([...v.collocations]).map(c => `<div class="match-item" onclick="handleMatch(this, '${c.en}', ${idx}, 'zh')">${c.zh}</div>`).join('')}
                        </div></div>
                    </div>
                </div>
            `).join('');
        }

        function handleMatch(el, val, idx, type) {
            if (el.classList.contains('correct')) return;
            const grid = document.getElementById(`match-grid-${idx}`);
            if (type === 'en') {
                grid.querySelectorAll('.match-item').forEach(i => i.classList.remove('selected'));
                el.classList.add('selected');
                state.matchSelected = { en: val, idx: idx, el: el };
            } else if (state.matchSelected && state.matchSelected.idx === idx) {
                if (val === state.matchSelected.en) {
                    el.classList.add('correct'); state.matchSelected.el.classList.add('correct');
                    state.xp += 5; updateXPDisplay();
                    if(grid.querySelectorAll('.match-item.correct').length >= 4) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                } else { el.classList.add('bg-red-200'); setTimeout(() => el.classList.remove('bg-red-200'), 500); }
                state.matchSelected = null;
            }
        }

        function showFeedback(isCorrect, correctAnswer = "") {
            const overlay = document.getElementById('feedbackOverlay');
            overlay.style.display = 'flex';
            const card = document.getElementById('feedbackCard');
            const icon = document.getElementById('feedbackIcon');
            const text = document.getElementById('feedbackText');
            const ans = document.getElementById('feedbackCorrectAnswer');

            if(isCorrect) {
                card.style.backgroundColor = 'var(--main-green)'; icon.innerText = '✅'; text.innerText = 'Excellent!'; ans.innerText = '+10 XP';
            } else {
                card.style.backgroundColor = 'var(--main-red)'; icon.innerText = '❌'; text.innerText = 'Not Quite...'; ans.innerText = `Correct: ${correctAnswer}`;
            }
            setTimeout(() => { overlay.style.display = 'none'; nextQuestion(); }, isCorrect ? 900 : 2500);
        }

        function startCoach(type) {
            state.currentChallenge = type; state.qIndex = 0; state.score = 0;
            let pool = [];
            vocabData.forEach(v => {
                pool.push({ word: v.word, targetForm: v.targetForm, type: 'core', chinese: v.chinese, data: v });
                v.wordFamily.forEach(f => pool.push({ word: f.word, targetForm: f.targetForm, chinese: f.chinese, fillBlank: f.fillBlank, type: 'family', data: v }));
            });
            state.challengePool = shuffleArray(pool).slice(0, 15);
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('challengePage').classList.remove('hidden');
            renderChallenge();
        }

        function renderChallenge() {
            const container = document.getElementById('challengeContainer');
            const q = state.challengePool[state.qIndex];
            document.getElementById('qCounter').innerText = `${state.qIndex + 1} / 15`;
            document.getElementById('progressBar').style.width = `${((state.qIndex + 1) / 15) * 100}%`;
            container.innerHTML = "";
            if (state.currentChallenge === 'speak') {
                container.innerHTML = `<h2 class="text-7xl font-black mb-12 italic tracking-tighter uppercase">${q.word}</h2><div onclick="recognitionStart()" id="micBtn" class="w-52 h-52 bg-yellow-400 rounded-full border-5 border-black brutal-btn flex items-center justify-center cursor-pointer mb-8 shadow-[12px_12px_0px_black]">${boldMicIcon}</div><p id="micHint" class="font-black text-gray-500 uppercase tracking-widest text-sm">Tap to Record</p>`;
            } else if (state.currentChallenge === 'spell') {
                container.innerHTML = `<div class="w-full space-y-12 text-center"><div onclick="speak('${q.word}')" class="w-32 h-32 bg-blue-100 mx-auto rounded-[40px] border-4 border-black brutal-btn flex items-center justify-center cursor-pointer shadow-[8px_8px_0px_black]">${boldSpeakerIcon}</div><input type="text" id="spellInput" class="w-full brutal-input text-center outline-none uppercase text-4xl font-black tracking-widest"><button onclick="checkSpell()" class="w-full py-6 brutal-btn bg-black text-white font-black rounded-2xl text-2xl uppercase shadow-[6px_6px_0px_white]">Submit</button></div>`;
                setTimeout(() => document.getElementById('spellInput').focus(), 150);
            } else {
                const fillText = q.fillBlank || q.data.sentence.replace(q.targetForm, "_______");
                container.innerHTML = `<div class="w-full text-left space-y-10"><div class="bg-gray-100 p-10 rounded-[48px] border-4 border-black italic font-bold text-2xl shadow-[8px_8px_0px_black]">"${fillText}"</div><p class="text-sm font-black text-orange-600 uppercase tracking-widest px-3 italic">時態與詞形 (Hint: ${q.chinese})</p><input type="text" id="fillInput" class="w-full brutal-input outline-none text-2xl font-black"><button onclick="checkFill()" class="w-full py-6 brutal-btn bg-orange-400 font-black rounded-2xl text-white text-2xl uppercase">Check</button></div>`;
            }
        }

        function recognitionStart() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Browser not supported");
            const r = new SpeechRecognition(); r.lang = 'en-US';
            document.getElementById('micBtn').style.backgroundColor = '#FF8A8A';
            r.onresult = (e) => {
                const transcript = e.results[0][0].transcript.toLowerCase();
                const target = state.challengePool[state.qIndex].word.toLowerCase();
                if(transcript.includes(target)) { state.score += 10; state.xp += 10; updateXPDisplay(); showFeedback(true); } 
                else { showFeedback(false, target); }
            };
            r.onend = () => { document.getElementById('micBtn').style.backgroundColor = 'var(--main-yellow)'; };
            r.start();
        }

        function checkSpell() {
            const input = document.getElementById('spellInput').value.toLowerCase().trim();
            const correct = state.challengePool[state.qIndex].word.toLowerCase();
            if(input === correct) { state.score += 10; state.xp += 10; updateXPDisplay(); showFeedback(true); } else { showFeedback(false, correct); }
        }

        function checkFill() {
            const input = document.getElementById('fillInput').value.toLowerCase().trim();
            const correct = state.challengePool[state.qIndex].targetForm.toLowerCase();
            if(input === correct) { state.score += 10; state.xp += 10; updateXPDisplay(); showFeedback(true); } else { showFeedback(false, correct); }
        }

        function nextQuestion() { state.qIndex++; if (state.qIndex < 15) renderChallenge(); else finishChallenge(); }

        function finishChallenge() {
            document.getElementById('challengeContainer').innerHTML = `<div class="text-center space-y-10"><div class="text-[10rem] animate-bounce">🏆</div><h2 class="text-5xl font-black italic uppercase tracking-tighter">Excellent Work!</h2><div class="text-7xl font-black text-[#5D5FEF]">+ ${state.score} XP</div><button onclick="backToMenu()" class="w-full py-6 brutal-btn bg-yellow-400 font-black rounded-[32px] uppercase text-2xl">Return Home</button></div>`;
            uploadToSheets();
        }

        function uploadToSheets() {
            if (!SCRIPT_URL) return;
            const data = { ...state.user, score: state.score, type: state.currentChallenge, timestamp: new Date().toLocaleString() };
            fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
        }

        function backToMenu() { document.getElementById('challengePage').classList.add('hidden'); document.getElementById('mainMenu').classList.remove('hidden'); }
        function speak(t) { const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; window.speechSynthesis.speak(m); }
        function shuffleArray(a) { return a.sort(() => Math.random() - 0.5); }
        function updateXPDisplay() { document.getElementById('xpCount').innerText = state.xp; }
    </script>
</body>
</html>
