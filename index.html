<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VocabPop 單字挑戰 - B2L3 Sakura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-sakura-top: #FFF0F5;
            --bg-sakura-bottom: #FFD1DC;
            --main-purple: #5D5FEF;
            --main-pink-dark: #D85B8C;
            --main-yellow: #FFD93D;
            --border-black: #000000;
        }
        body { 
            font-family: 'Lexend', "Microsoft JhengHei", sans-serif; 
            background: linear-gradient(180deg, var(--bg-sakura-top) 0%, var(--bg-sakura-bottom) 100%);
            background-attachment: fixed;
            color: var(--border-black);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .brutal-card {
            background: white; border: 4px solid var(--border-black);
            box-shadow: 8px 8px 0px 0px var(--border-black); border-radius: 32px;
        }
        .brutal-btn {
            border: 4px solid var(--border-black); box-shadow: 4px 4px 0px 0px var(--border-black);
            transition: all 0.1s; cursor: pointer;
        }
        .brutal-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px 0px var(--border-black); }
        .brutal-input { border: 4px solid var(--border-black); border-radius: 20px; padding: 16px; font-weight: 800; font-size: 1.1rem; outline: none; }

        /* 首頁頂條 */
        .login-top-bar { background-color: var(--main-pink-dark); height: 18px; width: 100%; border-bottom: 4px solid black; }

        /* Learn Header - 手機最佳化 */
        .learn-header {
            background: radial-gradient(#ffffff44 2.5px, transparent 2.5px), linear-gradient(135deg, #5D5FEF 0%, #4B4DDB 100%);
            background-size: 24px 24px, 100% 100%;
            border-radius: 28px 28px 0 0;
            padding: 50px 15px 90px; 
            color: white; text-align: center; position: relative;
            border-bottom: 5px solid black;
        }
        .pos-badge { position: absolute; top: 15px; left: 15px; background: black; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-style: italic; font-size: 0.8rem; border: 3px solid black; }
        .ipa-tag { background: rgba(0,0,0,0.3); padding: 5px 18px; border-radius: 99px; font-weight: 800; font-size: 0.85rem; display: inline-block; margin-bottom: 15px; }
        
        /* 修正：單字不換行且字體適中 */
        .word-title-main { 
            font-size: clamp(2.2rem, 10vw, 3.5rem); 
            font-weight: 900; 
            line-height: 1.2; 
            margin-bottom: 20px; 
            color: white; 
            white-space: nowrap; 
            overflow: hidden;
            padding: 0 10px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
        }
        
        .syllable-wrap { display: flex; justify-content: center; gap: 6px; margin-bottom: 15px; flex-wrap: wrap; }
        .syllable-pill { padding: 4px 14px; border-radius: 12px; font-weight: 800; font-size: 0.9rem; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); color: white; }
        .syllable-pill.stress { background: var(--main-yellow); border-color: black; color: black; box-shadow: 2.5px 2.5px 0px black; }

        .speaker-btn-large {
            width: 90px; height: 90px; background: white; border: 4.5px solid black;
            box-shadow: 8px 8px 0px black; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto -130px; cursor: pointer; position: relative; z-index: 50;
        }

        /* 內容區塊 */
        .section-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid black; display: inline-block; margin-right: 8px; }
        .family-box { background: #EEF2FF; border: 2.5px solid #C7D2FE; border-radius: 20px; padding: 20px; margin: 15px 0; text-align: left; }
        .mini-match-card { background: #FFEDF6; border: 3.5px solid #FFB7C5; border-radius: 28px; padding: 22px; margin-top: 85px; }
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .match-item { background: white; border: 3px solid #FFB7C5; padding: 12px; border-radius: 16px; font-size: 0.9rem; font-weight: 800; text-align: center; cursor: pointer; box-shadow: 3px 3px 0px #FFB7C5; transition: 0.2s; }
        .match-item.selected { background: var(--main-yellow); border-color: black; box-shadow: 3px 3px 0px black; transform: scale(1.05); }
        .match-item.correct { background: #A3E4B5; border-color: black; opacity: 0.6; pointer-events: none; }
        .match-item.wrong { background: #FF8A8A; border-color: black; }

        #feedbackOverlay { position: fixed; inset: 0; z-index: 100; display: none; align-items: center; justify-content: center; flex-direction: column; background-color: rgba(255,255,255,0.85); backdrop-filter: blur(8px); }
        .hidden { display: none; }
    </style>
</head>
<body class="flex flex-col items-center p-4">

    <!-- 即時反饋層 -->
    <div id="feedbackOverlay">
        <div id="feedbackCard" class="brutal-card p-12 flex flex-col items-center gap-6 min-w-[320px]">
            <div id="feedbackIcon" class="text-8xl mb-2">✅</div>
            <div id="feedbackText" class="text-4xl font-black italic uppercase text-center">Correct!</div>
            <div id="feedbackCorrectAnswer" class="text-xl font-bold text-gray-700 text-center"></div>
        </div>
    </div>

    <!-- 1. 登入頁面 -->
    <div id="loginPage" class="w-full max-w-md mt-10">
        <div class="brutal-card overflow-hidden bg-white text-center">
            <div class="login-top-bar"></div>
            <div class="p-8 pt-10 space-y-10">
                <div class="flex flex-col items-center">
                    <div class="w-24 h-24 bg-[#FFD93D] rounded-full border-4 border-black shadow-[5px_5px_0px_black] flex items-center justify-center mb-6">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="black"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                    </div>
                    <h1 class="text-5xl font-black italic tracking-tighter mb-2"><span class="text-[#5D5FEF]">VOCAB</span><span class="text-[#D85B8C]">POP</span></h1>
                    <p class="text-gray-500 font-black tracking-widest text-lg uppercase">Student Login</p>
                </div>
                <div class="space-y-6 text-left">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1"><label class="font-black text-gray-400 uppercase text-[10px] pl-1">Class (班級) *</label><input type="text" id="classInput" placeholder="104" class="w-full brutal-input focus:bg-pink-50"></div>
                        <div class="space-y-1"><label class="font-black text-gray-400 uppercase text-[10px] pl-1">No. (座號) *</label><input type="text" id="noInput" placeholder="e.g. 15" class="w-full brutal-input focus:bg-pink-50"></div>
                    </div>
                    <div class="space-y-1"><label class="font-black text-gray-400 uppercase text-[10px] pl-1">Name (姓名) *</label><input type="text" id="nameInput" placeholder="e.g. 王小明" class="w-full brutal-input focus:bg-pink-50"></div>
                </div>
                <button onclick="login()" class="w-full py-5 brutal-btn bg-[#6B66FF] text-white font-black text-xl rounded-2xl flex items-center justify-center gap-3 shadow-[5px_5px_0px_black] uppercase italic">Start Journey <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></button>
            </div>
        </div>
    </div>

    <!-- 2. 主選單 -->
    <div id="mainMenu" class="w-full max-w-md hidden space-y-4">
        <div class="flex items-center justify-between px-2 py-1">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-yellow-400 border-3 border-black rounded-full flex items-center justify-center font-black shadow-[2px_2px_0px_black]">⚡</div>
                <div id="userInfoDisplay" class="text-[10px] font-bold text-gray-500 uppercase tracking-tighter"></div>
            </div>
            <div class="bg-black text-white px-5 py-2 rounded-full border-2 border-black font-black text-xs">LV.1 | <span id="xpCount">0</span> XP</div>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <button id="tabLearn" onclick="switchTab('learn')" class="py-4 brutal-btn bg-white font-black rounded-2xl flex items-center justify-center gap-2">📖 LEARN</button>
            <button id="tabCoach" onclick="switchTab('coach')" class="py-4 brutal-btn bg-white font-black rounded-2xl flex items-center justify-center gap-2 text-pink-600">🧠 COACH</button>
        </div>
        <div id="learnView" class="space-y-16 pt-4 pb-20 text-left"></div>
        <div id="coachView" class="hidden pt-4 space-y-5">
            <button onclick="startCoach('speak')" class="w-full flex items-center p-7 bg-[#A3E4B5] brutal-btn rounded-[32px]"><div class="w-16 h-16 bg-white border-4 border-black rounded-2xl flex items-center justify-center mr-5 shadow-[3px_3px_0px_black] text-2xl">🎤</div><div class="text-left flex-grow"><h3 class="font-black text-2xl uppercase italic">Pro Speak</h3><p class="text-[11px] font-bold opacity-70">發音挑戰 (隨機 15 題)</p></div></button>
            <button onclick="startCoach('spell')" class="w-full flex items-center p-7 bg-[#9CC2E8] brutal-btn rounded-[32px]"><div class="w-16 h-16 bg-white border-4 border-black rounded-2xl flex items-center justify-center mr-5 shadow-[3px_3px_0px_black] text-2xl">⌨</div><div class="text-left flex-grow"><h3 class="font-black text-2xl uppercase italic">Spell It</h3><p class="text-[11px] font-bold opacity-70">聽寫挑戰 (隨機 15 題)</p></div></button>
            <button onclick="startCoach('fill')" class="w-full flex items-center p-7 bg-[#E8B67D] brutal-btn rounded-[32px]"><div class="w-16 h-16 bg-white border-4 border-black rounded-2xl flex items-center justify-center mr-5 shadow-[3px_3px_0px_black] text-2xl">✏</div><div class="text-left flex-grow"><h3 class="font-black text-2xl uppercase italic">Fill In</h3><p class="text-[11px] font-bold opacity-70">時態克漏字 (隨機 15 題)</p></div></button>
        </div>
    </div>

    <!-- 3. 挑戰介面 -->
    <div id="challengePage" class="w-full max-w-md hidden space-y-6">
        <div class="flex justify-between items-center"><button onclick="backToMenu()" class="font-black border-3 border-black px-5 py-2 rounded-xl bg-white shadow-[3px_3px_0px_black]">← EXIT</button><div id="qCounter" class="bg-black text-white px-4 py-1.5 rounded-xl font-black text-sm">1 / 15</div></div>
        <div id="challengeContainer" class="brutal-card p-10 bg-white min-h-[500px] flex flex-col items-center justify-center relative"></div>
        <div class="w-full bg-gray-200 h-5 border-3 border-black rounded-full overflow-hidden"><div id="progressBar" class="bg-pink-400 h-full w-0 transition-all duration-300"></div></div>
    </div>

    <script>
        // --- 核心設定：請貼入您的 GAS 部署網址 ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwvZjdHRTuQeT80Dmp2RAvrO-u9qfX7R2TRgN8Gdfw8eJwoa6C8YXnCbdJpoQJYqOE1/exec"; 

        const boldSpeakerIcon = `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;
        const boldMicIcon = `<svg width="65" height="65" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`;

        const vocabData = [
            {
                word: "grace", pos: "n.", ipa: "/ɡres/", syllables: ["grace"], stressIndex: 0,
                chinese: "優雅；優美", sentence: "The cat leapt onto the windowsill with grace, landing softly.", targetForm: "grace",
                collocations: [{ en: "with grace", zh: "優雅地" }, { en: "state of grace", zh: "優雅境界" }, { en: "natural grace", zh: "天生優雅" }],
                wordFamily: [{ word: "graceful", pos: "adj.", chinese: "優美的" }]
            },
            {
                word: "desperately", pos: "adv.", ipa: "/ˈdespərıtlı/", syllables: ["des", "per", "ate", "ly"], stressIndex: 0,
                chinese: "拚命地", sentence: "The mother desperately searched the crowded mall for her missing child.", targetForm: "desperately",
                collocations: [{ en: "desperately search", zh: "拚命搜尋" }, { en: "desperately need", zh: "極度需要" }, { en: "want desperately", zh: "極度渴望" }],
                wordFamily: [{ word: "desperate", pos: "adj.", chinese: "渴望的；絕望的", fillBlank: "The little girl was _______ for attention." }]
            },
            {
                word: "reluctantly", pos: "adv.", ipa: "/riˈlaktəntli/", syllables: ["re", "luc", "tant", "ly"], stressIndex: 1,
                chinese: "不情願地", sentence: "John reluctantly agreed to tidy his bedroom after being asked.", targetForm: "reluctantly",
                collocations: [{ en: "reluctantly agree", zh: "勉強同意" }, { en: "reluctantly accept", zh: "不情願地接受" }],
                wordFamily: [{ word: "reluctant", pos: "adj.", chinese: "勉強的", fillBlank: "Nora was having such a good time that she was _______ to leave." }]
            },
            {
                word: "describe", pos: "vt.", ipa: "/dıˈskraib/", syllables: ["de", "scribe"], stressIndex: 1,
                chinese: "描述", sentence: "People often describe Zoe as someone dedicated to her work.", targetForm: "describe",
                collocations: [{ en: "describe in detail", zh: "詳細描述" }, { en: "beyond description", zh: "難以筆墨形容" }],
                wordFamily: [{ word: "description", pos: "n.", chinese: "描述", fillBlank: "The beauty of the sunset was beyond _______." }]
            },
            {
                word: "shiver", pos: "vi.", ipa: "/ˈʃıvə/", syllables: ["shiv", "er"], stressIndex: 0,
                chinese: "顫抖", sentence: "Jamie shivered with fear as the large dog drew nearer.", targetForm: "shivered",
                collocations: [{ en: "shiver with fear", zh: "恐懼發抖" }, { en: "shiver with cold", zh: "冷得發抖" }],
                wordFamily: []
            },
            {
                word: "frustrate", pos: "vt.", ipa: "/ˈfras tret/", syllables: ["frus", "trate"], stressIndex: 0,
                chinese: "使沮喪", sentence: "It frustrates me that I'm not able to communicate fluently.", targetForm: "frustrates",
                collocations: [{ en: "deeply frustrate", zh: "深感沮喪" }, { en: "frustrate efforts", zh: "挫敗努力" }],
                wordFamily: [{ word: "frustration", pos: "n.", chinese: "沮喪", fillBlank: "Harry yelled out in _______ when he was locked out." }]
            },
            {
                word: "concentrate", pos: "vi. vt.", ipa: "/ˈkansn, tret/", syllables: ["con", "cen", "trate"], stressIndex: 0,
                chinese: "專注；集中", sentence: "Sandy was concentrating on the video game so fully.", targetForm: "concentrating",
                collocations: [{ en: "concentrate on", zh: "專注於" }, { en: "hard to concentrate", zh: "難以專注" }],
                wordFamily: [{ word: "concentration", pos: "n.", chinese: "專注力", fillBlank: "Julia began to lose _______ after studying for hours." }]
            },
            {
                word: "explain", pos: "vt. vi.", ipa: "/ikˈsplen/", syllables: ["ex", "plain"], stressIndex: 1,
                chinese: "解釋", sentence: "Before the game started, the coach carefully explained the rules.", targetForm: "explained",
                collocations: [{ en: "explain oneself", zh: "為自己辯解" }, { en: "without explanation", zh: "不加解釋地" }],
                wordFamily: [{ word: "explanation", pos: "n.", chinese: "解釋", fillBlank: "The concert was canceled without _______." }]
            },
            {
                word: "confess", pos: "vt. vi.", ipa: "/kənˈfes/", syllables: ["con", "fess"], stressIndex: 1,
                chinese: "坦白；承認", sentence: "Kevin confessed that he was the one who actually drove.", targetForm: "confessed",
                collocations: [{ en: "confess a crime", zh: "認罪" }, { en: "confess that...", zh: "承認..." }],
                wordFamily: [{ word: "confession", pos: "n.", chinese: "坦白；承認", fillBlank: "Tom finally made a _______ and admitted the truth." }]
            },
            {
                word: "depart", pos: "vt. vi.", ipa: "/diˈpart/", syllables: ["de", "part"], stressIndex: 1,
                chinese: "離開；去世", sentence: "The soldier departed this world peacefully after years.", targetForm: "departed",
                collocations: [{ en: "depart for New York", zh: "前往紐約" }, { en: "scheduled to depart", zh: "預計出發" }],
                wordFamily: [{ word: "departure", pos: "n.", chinese: "離開", fillBlank: "The ship's _______ was delayed due to rough seas." }]
            }
        ];

        let state = { user: {}, xp: 0, currentView: 'login', challengePool: [], qIndex: 0, score: 0, matchSelected: null };

        function login() {
            const cl = document.getElementById('classInput').value;
            const no = document.getElementById('noInput').value;
            const nm = document.getElementById('nameInput').value;
            if(!cl || !no || !nm) return alert("請輸入完整資料！");
            state.user = { class: cl, no: no, name: nm };
            document.getElementById('userInfoDisplay').innerText = `${cl}班 ${no}號 ${nm}`;
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainMenu').classList.remove('hidden');
            switchTab('learn');
        }

        function switchTab(tab) {
            state.currentView = tab;
            document.getElementById('learnView').classList.toggle('hidden', tab !== 'learn');
            document.getElementById('coachView').classList.toggle('hidden', tab !== 'coach');
            document.getElementById('tabLearn').style.backgroundColor = tab === 'learn' ? 'white' : 'transparent';
            document.getElementById('tabCoach').style.backgroundColor = tab === 'coach' ? '#F8BBD0' : 'white';
            if(tab === 'learn') renderLearn();
        }

        function renderLearn() {
            const container = document.getElementById('learnView');
            container.innerHTML = vocabData.map((v, idx) => `
                <div class="brutal-card overflow-visible bg-white mb-32 relative text-left">
                    <div class="learn-header">
                        <div class="pos-badge">${v.pos}</div>
                        <div class="ipa-tag">${v.ipa}</div>
                        <div class="word-title-main">${v.word}</div>
                        <div class="syllable-wrap">
                            ${v.syllables.map((s, si) => `<div class="syllable-pill ${si === v.stressIndex ? 'stress' : ''}">${s}</div>`).join('')}
                        </div>
                        <div class="speaker-btn-large" onclick="speak('${v.word}')">${boldSpeakerIcon}</div>
                    </div>
                    <div class="p-6 pt-24 space-y-10">
                        <div><div class="sec-label"><span class="section-dot bg-yellow-400"></span>Meaning</div><p class="text-3xl font-black text-[#5D5FEF] pl-2 italic">${v.chinese}</p></div>
                        ${v.wordFamily.length > 0 ? `<div class="family-box"><div class="flex items-center gap-2 text-[#5D5FEF] font-black text-xs uppercase mb-3"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>Word Family:</div><div class="flex flex-col gap-2">${v.wordFamily.map(f => `<div class="bg-white border-2 border-[#C7D2FE] p-3 rounded-xl flex items-baseline gap-2"><span class="font-black text-lg text-[#5D5FEF]">${f.word}</span><span class="text-xs font-bold text-gray-400">(${f.pos})</span></div>`).join('')}</div></div>` : ''}
                        <div><div class="sec-label"><span class="section-dot bg-green-400"></span>Example</div><div class="bg-gray-50 border-4 border-gray-100 p-8 rounded-[24px] italic font-bold text-gray-700 text-lg leading-relaxed shadow-[4px_4px_0px_#eee]">"${v.sentence}"</div></div>
                        <div class="mini-match-card">
                            <div class="text-pink-600 font-black text-xs uppercase mb-3 tracking-widest">✨ Mini Match (Oxford Collocations)</div>
                            <div class="match-grid" id="match-grid-${idx}">
                                ${shuffleArray([...v.collocations]).map(c => `<div class="match-item" onclick="handleMatch(this, '${c.en}', ${idx}, 'en')">${c.en}</div>`).join('')}
                                ${shuffleArray([...v.collocations]).map(c => `<div class="match-item" onclick="handleMatch(this, '${c.en}', ${idx}, 'zh')">${c.zh}</div>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function handleMatch(el, val, idx, type) {
            if (el.classList.contains('correct')) return;
            const grid = document.getElementById(`match-grid-${idx}`);
            if (type === 'en') {
                grid.querySelectorAll('.match-item').forEach(i => i.classList.remove('selected'));
                el.classList.add('selected');
                state.matchSelected = { en: val, idx: idx, el: el };
            } else if (state.matchSelected && state.matchSelected.idx === idx) {
                if (val === state.matchSelected.en) {
                    el.classList.add('correct'); state.matchSelected.el.classList.add('correct');
                    state.matchSelected.el.classList.remove('selected');
                    state.xp += 5; updateXPDisplay();
                    if(grid.querySelectorAll('.match-item.correct').length >= 6) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                } else { el.classList.add('wrong'); setTimeout(() => el.classList.remove('wrong'), 500); }
                state.matchSelected = null;
            }
        }

        function startCoach(type) {
            state.currentChallenge = type; state.qIndex = 0; state.score = 0;
            let pool = [];
            vocabData.forEach(v => {
                pool.push({ word: v.word, targetForm: v.targetForm, type: 'core', chinese: v.chinese, data: v });
                v.wordFamily.forEach(f => { if(f.fillBlank) pool.push({ word: f.word, targetForm: f.targetForm || f.word, chinese: f.chinese, fillBlank: f.fillBlank, type: 'family', data: v }); });
            });
            state.challengePool = shuffleArray(pool).slice(0, 15);
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('challengePage').classList.remove('hidden');
            renderChallenge();
        }

        function renderChallenge() {
            const container = document.getElementById('challengeContainer');
            const q = state.challengePool[state.qIndex];
            document.getElementById('qCounter').innerText = `${state.qIndex + 1} / 15`;
            document.getElementById('progressBar').style.width = `${((state.qIndex + 1) / 15) * 100}%`;
            container.innerHTML = "";
            if (state.currentChallenge === 'speak') {
                container.innerHTML = `<h2 class="text-3xl font-black mb-10 italic tracking-tighter uppercase text-center overflow-hidden" style="white-space: nowrap;">${q.word}</h2><div onclick="recognitionStart()" id="micBtn" class="w-44 h-44 bg-yellow-400 rounded-full border-5 border-black brutal-btn flex items-center justify-center cursor-pointer mb-8 shadow-[10px_10px_0px_black]">${boldMicIcon}</div><p id="micHint" class="font-black text-gray-500 uppercase tracking-widest text-xs text-center">Tap to Record</p>`;
            } else if (state.currentChallenge === 'spell') {
                container.innerHTML = `<div class="w-full space-y-10 text-center"><div onclick="speak('${q.word}')" class="w-32 h-32 bg-pink-100 mx-auto rounded-[32px] border-4 border-black brutal-btn flex items-center justify-center cursor-pointer shadow-[8px_8px_0px_black]">${boldSpeakerIcon}</div><input type="text" id="spellInput" class="w-full brutal-input text-center outline-none uppercase text-3xl font-black tracking-widest"><button onclick="checkSpell()" class="w-full py-5 brutal-btn bg-black text-white font-black rounded-2xl text-xl uppercase">Submit</button></div>`;
                setTimeout(() => document.getElementById('spellInput').focus(), 150);
            } else {
                const fillText = q.fillBlank || q.data.sentence.replace(q.targetForm, "_______");
                container.innerHTML = `<div class="w-full text-left space-y-8"><div class="bg-gray-100 p-8 rounded-[36px] border-4 border-black italic font-bold text-xl leading-relaxed shadow-[6px_6px_0px_black]">"${fillText}"</div><p class="text-xs font-black text-orange-600 uppercase tracking-widest px-1 italic">時態與詞形 (Hint: ${q.chinese})</p><input type="text" id="fillInput" class="w-full brutal-input outline-none text-2xl font-black"><button onclick="checkFill()" class="w-full py-5 brutal-btn bg-orange-400 font-black rounded-2xl text-white text-xl uppercase">Check</button></div>`;
            }
        }

        // --- 優化後的錄音功能與錯誤提示 ---
        let recognition;
        function recognitionStart() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const micBtn = document.getElementById('micBtn');
            const micHint = document.getElementById('micHint');

            if (!SpeechRecognition) {
                micHint.innerHTML = "Browser not supported.<br>Please use Chrome/Safari.";
                micHint.classList.add('text-red-500');
                return;
            }

            if (recognition) { try { recognition.stop(); } catch(e) {} }

            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;

            recognition.onstart = () => {
                micBtn.style.backgroundColor = '#FF8A8A';
                micHint.innerText = "Listening...";
                micHint.classList.add('text-red-500');
            };

            recognition.onresult = (e) => {
                const transcript = e.results[0][0].transcript.toLowerCase();
                const target = state.challengePool[state.qIndex].word.toLowerCase();
                if(transcript.includes(target)) {
                    state.score += 10; state.xp += 10; updateXPDisplay(); 
                    showFeedback(true);
                } else { showFeedback(false, target); }
            };

            recognition.onerror = (event) => {
                console.error("Error:", event.error);
                micBtn.style.backgroundColor = 'var(--main-yellow)';
                if(event.error === 'not-allowed') micHint.innerText = "Mic blocked! Allow in settings.";
                else micHint.innerText = "Error! Tap to try again.";
            };

            recognition.onend = () => {
                micBtn.style.backgroundColor = 'var(--main-yellow)';
                if(micHint.innerText === "Listening...") micHint.innerText = "Tap to Record";
            };

            try { recognition.start(); } catch (err) { micHint.innerText = "Error! Try again."; }
        }

        function showFeedback(isCorrect, correctAnswer = "") {
            const overlay = document.getElementById('feedbackOverlay');
            overlay.style.display = 'flex';
            const card = document.getElementById('feedbackCard');
            const icon = document.getElementById('feedbackIcon');
            const text = document.getElementById('feedbackText');
            const ans = document.getElementById('feedbackCorrectAnswer');
            if(isCorrect) { card.style.backgroundColor = 'var(--main-green)'; icon.innerText = '✅'; text.innerText = 'Excellent!'; ans.innerText = '+10 XP'; }
            else { card.style.backgroundColor = 'var(--main-red)'; icon.innerText = '❌'; text.innerText = 'Not Quite...'; ans.innerText = `Correct: ${correctAnswer}`; }
            setTimeout(() => { overlay.style.display = 'none'; nextQuestion(); }, isCorrect ? 900 : 2500);
        }

        function checkSpell() { const input = document.getElementById('spellInput').value.toLowerCase().trim(); const correct = state.challengePool[state.qIndex].word.toLowerCase(); if(input === correct) { state.score += 10; state.xp += 10; updateXPDisplay(); showFeedback(true); } else { showFeedback(false, correct); } }
        function checkFill() { const input = document.getElementById('fillInput').value.toLowerCase().trim(); const correct = state.challengePool[state.qIndex].targetForm.toLowerCase(); if(input === correct) { state.score += 10; state.xp += 10; updateXPDisplay(); showFeedback(true); } else { showFeedback(false, correct); } }
        function nextQuestion() { state.qIndex++; if (state.qIndex < 15) renderChallenge(); else finishChallenge(); }
        function finishChallenge() { document.getElementById('challengeContainer').innerHTML = `<div class="text-center space-y-10"><div class="text-[10rem] animate-bounce">🏆</div><h2 class="text-5xl font-black italic uppercase tracking-tighter">Excellent Work!</h2><div class="text-7xl font-black text-[#5D5FEF]">+ ${state.score} XP</div><button onclick="backToMenu()" class="w-full py-6 brutal-btn bg-yellow-400 font-black rounded-[32px] uppercase text-2xl">Return Home</button></div>`; uploadToSheets(); }
        function uploadToSheets() { if (!SCRIPT_URL) return; const data = { ...state.user, score: state.score, type: state.currentChallenge, timestamp: new Date().toLocaleString() }; fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) }); }
        function backToMenu() { document.getElementById('challengePage').classList.add('hidden'); document.getElementById('mainMenu').classList.remove('hidden'); }
        function speak(t) { const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; window.speechSynthesis.speak(m); }
        function shuffleArray(a) { return a.sort(() => Math.random() - 0.5); }
        function updateXPDisplay() { document.getElementById('xpCount').innerText = state.xp; }
    </script>
</body>
</html>
